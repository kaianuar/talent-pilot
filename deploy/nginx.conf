worker_processes 1;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Gzip for the React bundle
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    upstream backend {
        server 127.0.0.1:8000;
    }

    # Common proxy settings, reused by every API block
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 9000;
        server_name _;

        # FastAPI routes — exact match, no prefix rewrite.
        # The frontend (VITE_API_URL) calls /upload, /match, /chat, etc.
        # directly, with no /api/ prefix.
        location ~ ^/(upload|match|chat|status|candidates|jobs|applications|audit-log|admin)(/|$) {
            proxy_pass http://backend;
        }

        # WebSocket for screening progress
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # gRPC-Web for screening (backend exposes this at /grpc-web/*)
        location ~ ^/grpc-web/ {
            proxy_pass http://backend;
        }

        # Static assets and SPA fallback
        location / {
            root /app/frontend-react/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
